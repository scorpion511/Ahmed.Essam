<html>
<head>
    <title>The Scorpio Host - Ahmed Essam</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Container that protects the logo from being cleared by success scripts */
        .status-box {
            margin-top: 100px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            display: inline-block;
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        #msgs {
            font-size: 28px;
            font-weight: bold;
            color: #e0faff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .loader {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- THE REFINED COMPACT IDENTITY CARD --- */
        .scorpio-card {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #00f2ff;
            border-radius: 15px;
            padding: 5px 25px;
            box-shadow: 0 0 10px #00f2ff, inset 0 0 5px #00f2ff;
            text-align: center;
            min-width: 450px;
            z-index: 1000;
        }
        .scorpio-title { font-size: 12px; color: #ffff00; font-weight: bold; margin-bottom: 2px; }
        .scorpio-badge { border: 1.5px solid #ffff00; border-radius: 10px; padding: 1px 12px; display: inline-block; animation: badge-rainbow 3s linear infinite; }
        @keyframes badge-rainbow { 0% { color: red; border-color: red; } 25% { color: yellow; border-color: yellow; } 50% { color: lime; border-color: lime; } 75% { color: cyan; border-color: cyan; } 100% { color: red; border-color: red; } }
        .name-banner { background: #ff0000; color: white; font-size: 24px; font-weight: bold; padding: 3px 35px; border-radius: 40px; display: inline-block; margin: 6px 0; box-shadow: 0 0 12px #ff0000; text-transform: uppercase; }
        .nice-time-text { font-size: 13px; color: #ffff00; margin-top: 3px; font-weight: bold; }
        .names-list { font-size: 24px; color: white; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }

        #console { display: none; }
    </style>

    <script>
        if (window.applicationCache.status=='0'){window.location.replace("cache.html");}
    </script>
    <script src="payload.js"></script>
    <script type='module' src='./alert.mjs'></script>
</head>
<body>
    <pre id='console'></pre>

    <div class="status-box">
        <!-- The logo is inside the status box so it stays visible -->
        <img src="../../logo.png" style="width: 200px; filter: drop-shadow(0 0 10px #00e5ff); mix-blend-mode: screen;">
        <h1 id="msgs">Jailbreaking <span style="color:#fc0404;">( Please wait ) ....</span></h1>
        <div class="loader"></div>
    </div>

    <!-- THE REFINED COMPACT HUD CARD -->
    <div class="scorpio-card">
        <div class="scorpio-title">Designed, Compiled by : <span class="scorpio-badge">Scorpio</span></div>
        <div class="name-banner">Ahmed ESSAM</div>
        <div class="nice-time-text">Have A Nice Time :</div>
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>
</body>
</html>
