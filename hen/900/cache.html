<html manifest="Cache.manifest">
<head>
<style>
    body{background:url('img.jpg') #24272b no-repeat center;background-size:cover;color:white;text-align:center;margin:0;overflow:hidden;font-family:sans-serif;}
    
    #progress{font-size:30px;margin-top:150px;text-shadow:2px 2px 5px black;}

    /* --- THE REFINED COMPACT IDENTITY CARD --- */
    .scorpio-card {
        position: absolute;
        bottom: 10px; /* Pinned to bottom */
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        border: 1.5px solid #00f2ff;
        border-radius: 20px;
        padding: 5px 30px;
        box-shadow: 0 0 15px #00f2ff, inset 0 0 8px #00f2ff;
        text-align: center;
        min-width: 450px;
    }

    .scorpio-title { font-size: 12px; color: #ffff00; font-weight: bold; margin-bottom: 2px; }
    
    /* SIMULTANEOUS RAINBOW BADGE */
    .scorpio-badge { 
        border: 1.5px solid #ffff00; 
        border-radius: 12px; 
        padding: 1px 12px; 
        display: inline-block;
        animation: badge-rainbow 3s linear infinite;
    }

    @keyframes badge-rainbow {
        0% { color: red; border-color: red; }
        25% { color: yellow; border-color: yellow; }
        50% { color: lime; border-color: lime; }
        75% { color: cyan; border-color: cyan; }
        100% { color: red; border-color: red; }
    }

    .name-banner { 
        background: #ff0000; 
        color: white; 
        font-size: 22px; 
        font-weight: bold; 
        padding: 3px 30px; 
        border-radius: 40px; 
        display: inline-block; 
        margin: 4px 0; 
        box-shadow: 0 0 10px #ff0000; 
        text-transform: uppercase; 
    }

    .nice-time-text { font-size: 12px; color: #ffff00; margin-top: 2px; font-weight: bold; }
    .names-list { font-size: 22px; color: white; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }
</style>
</head>
<body>
<script>
    history.replaceState(null,null,'index.html');var histlength=history.length;history.go(-histlength);
    function DLProgress(e){Percent=(Math.round(e.loaded/e.total*100));window.progress.innerHTML="Scorpio Caching: "+Percent+"%";}
    function DisplayCacheProgress(){window.progress.innerHTML="Scorpio Cache Installed ✔";setTimeout(function(){window.progress.innerHTML="Close & Re-Open Browser";},2000);}
    window.applicationCache.addEventListener("progress",DLProgress,false);
    window.applicationCache.oncached=function(e){DisplayCacheProgress();};
    window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>

<h1 id="progress">Initializing...</h1>

<!-- THE COMPACT SCORPIO HUD CARD -->
<div class="scorpio-card">
    <div class="scorpio-title">Designed, Compiled by : <span class="scorpio-badge">Scorpio</span></div>
    <div class="name-banner">Ahmed ESSAM</div>
    <div class="nice-time-text">Have A Nice Time :</div>
    <div class="names-list">Dareen & Omar & jojo</div>
</div>

</body>
</html>
