<html manifest="Cache.manifest"><head><title>Scorpio Project</title>
<style>
html,body{background-color:#111111;color:white;text-align:center;margin:0px;overflow:hidden;font-family:sans-serif;}
h1{text-shadow:0.1em 0.1em 0.2em #000;font-size:25px;text-align:center;color:white;}
.n{font-size:24px;font-weight:700;color:#ffea00;letter-spacing:2px;text-transform:uppercase;margin-top:10px;}
.w{font-size:16px;color:#00e5ff;margin-top:5px;}
</style></head><body><script>
history.replaceState(null,null,'index.html');var histlength=history.length;history.go(-histlength);
function DLProgress(e){Percent=(Math.round(e.loaded / e.total * 100));setTimeout(function(){window.progress.innerHTML="Installing Scorpio Cache: " + Percent + "%";},500)}
function DisplayCacheProgress(){setTimeout(function(){window.progress.innerHTML="Scorpio Cache Installed Successfully ✔";},1500);setTimeout(function(){window.progress.innerHTML="Now Close And Re-Open Your Browser ..";},3500);}window.applicationCache.addEventListener("progress",DLProgress,false);window.applicationCache.oncached=function(e){DisplayCacheProgress();};window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>
<br><br><br><br><br><br>
<h1 id=progress style="font-size:30px;margin-top:77px;margin-bottom:20px;">Preparing Scorpio Caching...</h1>
<div class="n">Ahmed ESSAM</div>
<div class="w">Welcome to SCORPION HACK</div>
</body></html>
