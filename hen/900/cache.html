<html manifest="Cache.manifest">
<head>
<title>Scorpio Cache - Ahmed Essam</title>
<style>
body{background:url('img.jpg') #24272b no-repeat center;background-size:cover;color:white;text-align:center;margin:0;overflow:hidden;font-family:sans-serif;}
.credit{position:absolute;bottom:20px;width:100%;color:#00e5ff;font-size:14px;letter-spacing:1px;}
#progress{font-size:30px;margin-top:150px;text-shadow:2px 2px 5px black;}
</style>
</head>
<body>
<script>
history.replaceState(null,null,'index.html');var histlength=history.length;history.go(-histlength);
function DLProgress(e){Percent=(Math.round(e.loaded/e.total*100));window.progress.innerHTML="Installing Scorpio Cache: "+Percent+"%";}
function DisplayCacheProgress(){window.progress.innerHTML="Scorpio Cache Installed ✔";setTimeout(function(){window.progress.innerHTML="Close and Re-Open Browser";},2000);}
window.applicationCache.addEventListener("progress",DLProgress,false);
window.applicationCache.oncached=function(e){DisplayCacheProgress();};
window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>
<h1 id="progress">Initializing Cache...</h1>
<div class="credit">Designed and Compiled By <b>Ahmed Essam</b></div>
<div style="margin-top:150px;font-size:12px;color:rgba(255,255,255,0.4)">Special Thanks: @sleirsgoevy, ChendoChap, SpecterDev, SiSTR0, Znullptr</div>
</body>
</html>
