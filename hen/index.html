<html>
<head>
    <title>Scorpio Project - Firmware Bridge</title>
    <style>
        html, body {
            background: url('../img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
        }

        /* CONTAINER WRAPPER FOR THE OUTER SPINNING PERIMETER FIRE TRACER */
        .logo-wrapper {
            width: 288px;               /* Sized to perfectly frame the 280px logo */
            height: 288px;
            margin: 35px auto 0 auto;   /* Replaces the logo's native top margin positioning */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            overflow: hidden;           /* Restricts the running fire trail to the border edge channel */
            box-shadow: 0 0 25px 5px rgba(255, 55, 0, 0.6);
        }

        /* CONIC FIRE MATRIX (ROTATES BEHIND THE IMAGE AS A BACKGROUND TRACER) */
        .logo-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(#ff0000, #ff7700, #ffea00, #ff3700, #ff0000);
            animation: rotateFire 3s linear infinite;
        }

        /* ORIGINAL UNTOUCHED LOGO DIMENSIONS AND STYLES WITH ROUNDED EDGES */
        .scorpio-logo {
            width: 280px;
            height: 280px;
            object-fit: cover;
            margin-top: 0px;            /* Reset to 0 since positioning is now handled by wrapper margin */
            border-radius: 12px;
            position: relative;
            z-index: 2;                 /* Forces the logo box over the rotating light layer */
            background: #000;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        .menu-container {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 50px;
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s ease;
            display: inline-block;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        #msgs {
            font-size: 26px;
            color: #00e5ff;
            margin-top: 15px;
            height: 40px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* Adjusted position to guarantee zero touching with menu layout elements */
        .designer-credit-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 4px solid #00e5ff;
            border-radius: 24px;
            padding: 15px 50px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7), inset 0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 460px;
        }

        .credit-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #ffff00;
        }

        .rainbow-badge {
            border: 2px solid #55ff00;
            border-radius: 15px;
            padding: 2px 16px;
            font-weight: bold;
            font-size: 15px;
            background: transparent;
            background-image: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowShift 8s linear infinite;
        }

        /* Ahmed ESSAM Dark Fire Neon Pill */
        .name-pill {
            background: #120000;
            border: 2px solid #ff3700;
            font-size: 25px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 8px 65px;
            border-radius: 25px;
            box-shadow: 0 0 20px 4px rgba(255, 43, 0, 0.75), inset 0 0 10px rgba(0,0,0,0.9);
            margin: 2px 0;
            display: inline-block;
            
            /* Dark Volcanic Fire Text Gradient styling */
            background: linear-gradient(45deg, #ff2a00, #ff8800, #ffea00, #ff8800, #ff2a00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: darkFireFlow 3s ease infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .welcome-text {
            font-size: 21px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #00e5ff, #ffffff, #00e5ff, #00ffcc);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlowFade 4s ease infinite;
            text-align: center;
            margin-top: 3px;
        }

        /* ROTATION KEYFRAMES TO MAKE THE BORDER LIGHTSTREAM MOVE UNTOUCHED */
        @keyframes rotateFire {
            100% { transform: rotate(360deg); }
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlowFade {
            0% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(0,229,255,0.9)); opacity: 1; }
            100% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
        }

        @keyframes darkFireFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <!-- Outer running fire tracer channel box container element -->
    <div class="logo-wrapper">
        <img src="../logo.png" class="scorpio-logo">
    </div>
    
    <div id="msgs">Select PS4 Firmware</div>

    <div class="menu-container">
        <a href="900/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 9.00 (PSFree No USB)'" onmouseout="msgs.innerHTML='Select PS4 Firmware'">FW 9.00</a>
        <a href="restore/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='Restore User Guide'" onmouseout="msgs.innerHTML='Select PS4 Firmware'">Restore</a>
    </div>

    <!-- Scorpiozed Designer Credit Component -->
    <div class="designer-credit-box">
        <div class="credit-header">
            Designed, Compiled by : <span class="rainbow-badge">Scorpio</span>
        </div>
        <div class="name-pill">
            Ahmed ESSAM
        </div>
        <div class="welcome-text">
            Welcome to SCORPION HACK
        </div>
    </div>

</body>
</html>
