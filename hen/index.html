<html>
<head>
    <title>Scorpio Project - Firmware Selector</title>
    <style>
        html, body {
            /* Full GitHub path to ensure background loads */
            background: url('https://github.io') no-repeat center center fixed; 
            background-size: cover;
            background-color: #24272b;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .scorpio-logo {
            width: 250px;
            margin-top: 40px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        #msgs {
            font-size: 24px;
            color: #00e5ff;
            margin-top: 20px;
        }

        .menu-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 6px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        /* HUD Card Styling */
        .scorpio-card {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #00f2ff;
            border-radius: 15px;
            padding: 5px 25px;
            box-shadow: 0 0 10px #00f2ff, inset 0 0 5px #00f2ff;
            text-align: center;
            min-width: 380px;
        }
        .scorpio-title { font-size: 12px; color: #ffff00; font-weight: bold; margin-bottom: 2px; }
        .scorpio-badge { border: 1.5px solid #ffff00; border-radius: 10px; padding: 1px 10px; display: inline-block; animation: badge-rainbow 3s linear infinite; }
        @keyframes badge-rainbow { 0% { color: red; border-color: red; } 25% { color: yellow; border-color: yellow; } 50% { color: lime; border-color: lime; } 75% { color: cyan; border-color: cyan; } 100% { color: red; border-color: red; } }
        .name-banner { background: #ff0000; color: white; font-size: 20px; font-weight: bold; padding: 2px 25px; border-radius: 30px; display: inline-block; margin: 4px 0; box-shadow: 0 0 8px #ff0000; text-transform: uppercase; }
        .nice-time-text { font-size: 12px; color: #ffff00; margin-top: 2px; font-weight: bold; }
        .names-list { font-size: 20px; color: white; font-weight: bold; text-shadow: 0 0 8px #00f2ff; }
    </style>
</head>
<body>

    <!-- Full GitHub path for the logo -->
    <img src="https://github.io" class="scorpio-logo">
    
    <div id="msgs">Select Firmware Version</div>

    <div class="menu-container">
        <a href="505/index.html" class="scorpio-btn">FW 5.05</a>
        <a href="672/index.html" class="scorpio-btn">FW 6.72</a>
        <a href="900/index.html" class="scorpio-btn">FW 9.00</a>
    </div>

    <div class="scorpio-card">
        <div class="scorpio-title">Designed, Compiled by : <span class="scorpio-badge">Scorpio</span></div>
        <div class="name-banner">Ahmed ESSAM</div>
        <div class="nice-time-text">Have A Nice Time :</div>
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>

</body>
</html>
