<!DOCTYPE html>
<html>
<head>
    <title>Scorpio Project - User Guide Restore</title>
    <style>
        /* Replaced local asset call with background path to look one level up into root */
        html, body {
            background: url('../img.jpg') no-repeat center center fixed !important; 
            background-size: cover !important;
            color: white !important;
            text-align: center !important;
            margin: 0px !important;
            overflow: hidden !important;
            font-family: 'Segoe UI', Tahoma, sans-serif !important;
            height: 100vh;
            position: relative;
        }

        h1 {
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8) !important;
            font-size: 28px !important;
            text-align: center !important;
            color: #00e5ff !important;
            margin-top: 35px !important;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #msgs {
            font-size: 24px;
            color: #00e5ff;
            margin-top: 20px;
            height: 40px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* Core container padding adjustment to center the option layout blocks */
        .menu-container {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .TextCaption {
            display: block;
            font-size: 20px;
            color: #e0faff !important;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        a {
            display: inline-block;  
            text-decoration: none;
            transition: 0.3s ease;
        }

        /* Hover animation targets the custom styled capsule block wrapper */
        a:hover .restore-btn-capsule {
            background: rgba(0, 229, 255, 0.1) !important;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8) !important;
            border: 1px solid rgba(0, 229, 255, 1) !important;
            transform: scale(1.05);
        }

        /* Stable Scorpio Designer Credit Box */
        .designer-credit-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 4px solid #00e5ff;
            border-radius: 24px;
            padding: 15px 50px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7), inset 0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 460px;
        }

        .credit-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: bold;
            color: #ffff00;
        }

        .rainbow-badge {
            border: 2px solid #55ff00;
            border-radius: 15px;
            padding: 2px 16px;
            font-weight: bold;
            font-size: 15px;
            background: transparent;
            background-image: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowShift 8s linear infinite;
        }

        /* Ahmed ESSAM Dark Fire Golden Magma Neon Pill */
        .name-pill {
            background: #120000;
            border: 2px solid #ff3700;
            font-size: 25px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 8px 65px;
            border-radius: 25px;
            box-shadow: 0 0 20px 4px rgba(255, 43, 0, 0.75), inset 0 0 10px rgba(0,0,0,0.9);
            margin: 2px 0;
            display: inline-block;
            background: linear-gradient(45deg, #ff2a00, #ff8800, #ffea00, #ff8800, #ff2a00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: darkFireFlow 3s ease infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .welcome-text {
            font-size: 21px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #00e5ff, #ffffff, #00e5ff, #00ffcc);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlowFade 4s ease infinite;
            text-align: center;
            margin-top: 3px;
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlowFade {
            0% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(0,229,255,0.9)); opacity: 1; }
            100% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
        }

        @keyframes darkFireFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <h1>User Guide Recovery Menu</h1>
    
    <!-- Unified real-time string feedback target box -->
    <div id="msgs">Select options below to save page</div>

    <div class="menu-container">
        <!-- Finalized Localized Core Button Block -->
        <a href="../900/index.html" onMouseOver="msgs.innerHTML='Save a page to a Users Guide Without using usb version 9.00'" onMouseOut="msgs.innerHTML='Select options below to save page'">
            <div class="restore-btn-capsule" style="
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(0, 229, 255, 0.4);
                padding: 15px 45px;
                border-radius: 4px;
                box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
                display: inline-block;
                transition: 0.3s ease;
                letter-spacing: 1px;">
                <span class="TextCaption" style="margin-top: 0px;">Restore FW 9.00</span>
            </div>
        </a>
    </div>

    <!-- Official Scorpio Animated Control Branding Box -->
    <div class="designer-credit-box">
        <div class="credit-header">
            Designed, Compiled by : <span class="rainbow-badge">Scorpio</span>
        </div>
        <div class="name-pill">
            Ahmed ESSAM
        </div>
        <div class="welcome-text">
            Welcome to SCORPION HACK
        </div>
    </div>

</body>
</html>
