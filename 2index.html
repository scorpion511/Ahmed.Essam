<!DOCTYPE html>
<html manifest="cache.manifest">
<head>
<meta charset="utf-8">
<title>WELCOME TO SCORPION HACK</title>
<style>
html, body {
    background-image: url('img.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-color: #24272b;
    color: white;
    text-align: center;
    margin: 0px;
    overflow: hidden;
    font-family: sans-serif;
}

.logo {
    position: absolute;
    top: 15px;
    left: 15px;
    width: 120px;
    height: auto;
    filter: drop-shadow(0 0 5px #00f2ff);
}

.glow-title {
    font-size: 45px;
    color: #fff;
    animation: titleGlow 1.5s ease-in-out infinite alternate;
    margin-top: 60px;
}

@keyframes titleGlow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #fc0404, 0 0 30px #fc0404; }
    to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4d4d, 0 0 40px #ff4d4d; }
}

/* FROST BLUE GLOWING & SHAKING BUTTON */
.scorp-btn {
    display: inline-block;
    padding: 20px 40px;
    background-color: rgba(0, 242, 255, 0.2);
    color: #00f2ff;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
    border: 2px solid #00f2ff;
    margin-top: 30px;
    box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
    text-shadow: 0 0 10px #00f2ff;
    animation: shakeBtn 0.5s infinite; /* Subtle Shake */
}

@keyframes shakeBtn {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}

.scorp-btn:hover {
    background-color: #00f2ff;
    color: black;
    box-shadow: 0 0 40px #00f2ff;
}

.frost-box {
    display: inline-block;
    background: rgba(0, 0, 0, 0.7);
    padding: 20px 40px;
    border-radius: 15px;
    border: 2px solid #00f2ff;
    box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
    margin-top: 40px;
}

.name-d { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
.name-o { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
.name-j { color: #ffff00; text-shadow: 0 0 5px #ffff00; }

.fire-badge {
    display: inline-block;
    background: rgba(0, 0, 0, 0.8);
    padding: 8px 20px;
    border-radius: 5px;
    border: 2px solid #ff4500;
    box-shadow: 0 0 15px #ff4500, inset 0 0 5px #ff8c00;
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #ff4500;
    animation: fireGlow 0.8s infinite alternate;
}

@keyframes fireGlow {
    from { text-shadow: 0 0 10px #ff4500; border-color: #ff4500; }
    to { text-shadow: 0 0 20px #ff0000; border-color: #ff0000; }
}

#clock, #date { font-weight: bold; font-size: 22px; padding: 15px; color: white; }
#date { float: left; margin-left: 140px; }
#clock { float: right; }
</style>
<script>
    function showdate() {
        var dt = new Date();
        var H = dt.getHours(); var M = dt.getMinutes();
        if (M < 10) M = "0" + M; if (H < 10) H = "0" + H;
        document.getElementById("date").innerHTML = dt.getDate() + "/" + (dt.getMonth() + 1) + "/" + dt.getFullYear();
        document.getElementById("clock").innerHTML = H + ":" + M;
    }
    setInterval(showdate, 1000);
</script>
</head>
<body onload="showdate()">
    <img src="logo.png" class="logo">
    <span id="date"></span>
    <span id="clock"></span>
    
    <div style="margin-top: 20px;">
        <h1 class="glow-title">Welcome to SCORPION HACK</h1>
        <a href="hen/900/index.html" class="scorp-btn">LOAD GOLDHEN 9.00 AUTO</a>
        <br>
        
        <div class="frost-box">
            <h2 style="margin: 0; font-size: 26px;">Special thanks to: 
                <span class="name-d">Dareen</span> 
                <span class="name-o">Omar</span> 
                <span class="name-j">jojo</span>
            </h2>
            <br>
            <div class="fire-badge">Hacked By Ahmed Essam</div>
        </div>
    </div>
</body>
</html>
