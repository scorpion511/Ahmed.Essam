<html>
<head>
    <title>Scorpio Project - Advanced Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .fire-title {
            font-size: 45px; /* Shrunk slightly to lift everything up */
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            margin-top: 15px;
            letter-spacing: 5px;
            text-shadow: 0 0 5px #ff0000, 0 -5px 10px #ff0000, 2px -10px 15px #ff4b2b, -2px -20px 20px #ff4b2b;
            animation: flicker 1.5s infinite alternate;
        }
        @keyframes flicker {
            0% { text-shadow: 0 0 5px #ff0000, 0 -5px 10px #ff0000; }
            100% { text-shadow: 0 0 10px #ff0000, 0 -15px 25px #ff4b2b; }
        }

        .top-bar {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 12px 25px; /* Smaller padding */
            margin: 8px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: translateY(-3px);
        }

        .scorpio-btn.back { border-color: #ff4b2b; color: #ff4b2b; }

        #msgs {
            font-size: 24px;
            color: #00e5ff;
            margin-top: 5px;
            height: 35px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* --- COMPACT SCORPIO IDENTITY CARD --- */
        .scorpio-card {
            position: absolute;
            bottom: 5px; /* Absolute bottom */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1.5px solid #00f2ff;
            border-radius: 15px;
            padding: 5px 25px;
            box-shadow: 0 0 10px #00f2ff, inset 0 0 5px #00f2ff;
            text-align: center;
            min-width: 380px;
            z-index: 100;
        }

        .scorpio-title { font-size: 12px; color: #ffff00; font-weight: bold; margin-bottom: 2px; }

        .scorpio-badge { 
            border: 1.5px solid #ffff00; 
            border-radius: 10px; 
            padding: 1px 10px; 
            display: inline-block;
            animation: badge-rainbow 3s linear infinite;
        }

        @keyframes badge-rainbow {
            0% { color: red; border-color: red; }
            20% { color: yellow; border-color: yellow; }
            40% { color: lime; border-color: lime; }
            60% { color: cyan; border-color: cyan; }
            80% { color: magenta; border-color: magenta; }
            100% { color: red; border-color: red; }
        }

        .name-banner { 
            background: #ff0000; 
            color: white; 
            font-size: 20px; 
            font-weight: bold; 
            padding: 2px 25px; 
            border-radius: 30px; 
            display: inline-block; 
            margin: 4px 0; 
            box-shadow: 0 0 8px #ff0000; 
            text-transform: uppercase; 
        }

        .nice-time-text { font-size: 12px; color: #ffff00; margin-top: 2px; font-weight: bold; }

        .names-list { 
            font-size: 20px; 
            color: white; 
            font-weight: bold; 
            text-shadow: 0 0 8px #00f2ff; 
        }

    </style>

    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);

        function allhost505(){ hideAll(); host505.style.display = "block"; }
        function allhost672(){ hideAll(); host672.style.display = "block"; }
        function allhost900c(){ hideAll(); host900c.style.display = "block"; }
        function allgoldhen(){ hideAll(); goldhen.style.display = "block"; }
        function alltrainer(){ hideAll(); trainer.style.display = "block"; }
        function backall(){ hideAll(); all.style.display = "block"; msgs.innerHTML=""; }
        
        function hideAll(){
            all.style.display = "none";
            host505.style.display = "none";
            host672.style.display = "none";
            host900c.style.display = "none";
            trainer.style.display = "none";
            goldhen.style.display = "none";
        }
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <div class="fire-title">WELCOME TO SCORPION HACK</div>
    
    <img src="logo.png" style="width:140px; margin: 5px auto;">
    
    <div id="msgs">Select a Category</div>

    <div id="all">
        <button class="scorpio-btn" onclick="allhost505()">FW 5.05</button>
        <button class="scorpio-btn" onclick="allhost672()">FW 6.72</button>
        <button class="scorpio-btn" onclick="allhost900c()">FW 9.00</button>
        <br>
        <button class="scorpio-btn" onclick="allgoldhen()">GoldHEN</button>
        <button class="scorpio-btn" onclick="alltrainer()">Trainers</button>
    </div>

    <div id="host505" style="display:none">
        <a href="505/index.html" class="scorpio-btn">Load 5.05</a>
        <a href="restore/505/index.html" class="scorpio-btn">Restore</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>
    <div id="host672" style="display:none">
        <a href="672/index.html" class="scorpio-btn">Load 6.72</a>
        <a href="restore/672/index.html" class="scorpio-btn">Restore</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>
    <div id="host900c" style="display:none">
        <a href="900n/index.html" class="scorpio-btn">9.00 Auto</a>
        <a href="900c/index.html" class="scorpio-btn">9.00 Manual</a>
        <a href="restore/900/index.html" class="scorpio-btn">Restore</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>
    <div id="goldhen" style="display:none">
        <a href="hen/505/index.html" class="scorpio-btn">HEN 5.05</a>
        <a href="hen/672/index.html" class="scorpio-btn">HEN 6.72</a>
        <a href="hen/900/index.html" class="scorpio-btn">HEN 9.00</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>
    <div id="trainer" style="display:none">
        <a href="trainer/index505.html" class="scorpio-btn">T 5.05</a>
        <a href="trainer/index672.html" class="scorpio-btn">T 6.72</a>
        <a href="trainer/index900.html" class="scorpio-btn">T 9.00</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <div class="scorpio-card">
        <div class="scorpio-title">Designed, Compiled by : <span class="scorpio-badge">Scorpio</span></div>
        <div class="name-banner">Ahmed ESSAM</div>
        <div class="nice-time-text">Have A Nice Time :</div>
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>
</body>
</html>
