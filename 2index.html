<!DOCTYPE html>
<html manifest="cache.manifest">
<head>
<meta charset="utf-8">
<title>SCORPION HACK - MAIN MENU</title>
<style>
html, body {
background-image: url('ros.gif');
background-size: 100%;
background-repeat: no-repeat;
background-color: #24272b;
color: white;
text-align: center;
margin: 0px;
overflow: hidden;
}

h1 {
    text-shadow: 0.1em 0.1em 0.2em black;
    font-size: 30px;
    color: #fc0404;
}

.btn-container {
    margin-top: 50px;
}

.scorp-btn {
    display: inline-block;
    padding: 20px 40px;
    background-color: #fc0404;
    color: white;
    font-size: 22px;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
    border: 2px solid white;
    transition: 0.3s;
}

.scorp-btn:hover {
    background-color: white;
    color: #fc0404;
    transform: scale(1.1);
}

#clock, #date {
    font-weight: bold;
    font-size: 24px;
    padding: 15px;
    color: white;
}

#date { float: left; }
#clock { float: right; }

.credits {
    position: absolute;
    bottom: 20px;
    width: 100%;
    font-size: 18px;
}
</style>
<script>
    function showdate() {
        var dt = new Date();
        var Hour = dt.getHours();
        var Minute = dt.getMinutes();
        var Day = dt.getDate();
        var Month = dt.getMonth() + 1;
        var Year = dt.getFullYear();
        if (Minute < 10) { Minute = "0" + Minute; }
        if (Hour < 10) { Hour = "0" + Hour; }
        document.getElementById("date").innerHTML = Day + "/" + Month + "/" + Year;
        document.getElementById("clock").innerHTML = Hour + ":" + Minute;
    }
    setInterval(showdate, 1000);
</script>
</head>
<body onload="showdate()">
    <span id="date"></span>
    <span id="clock"></span>
    
    <div style="margin-top: 100px;">
        <h1>SCORPION HACK</h1>
        <div class="btn-container">
            <!-- THIS IS THE MAIN REDIRECT TO YOUR SUBFOLDER -->
            <a href="hen/900/index.html" class="scorp-btn">LOAD GOLDHEN 9.00 AUTO</a>
        </div>
    </div>

    <div class="credits">
        <h2 style="color: #fc0404;">Special Thanks: <span style="color: white;">Dareen Omar jojo & Ahmed ESSAM</span></h2>
    </div>
</body>
</html>
