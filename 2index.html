<html>
<head>
    <title>Scorpio Project - Advanced Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Black Red Fire Effect Title */
        .fire-title {
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            color: #000; /* Black core */
            margin-top: 20px;
            letter-spacing: 5px;
            text-shadow: 
                0 0 5px #ff0000, 
                0 -5px 10px #ff0000, 
                2px -10px 15px #ff4b2b, 
                -2px -20px 20px #ff4b2b;
            animation: flicker 1.5s infinite alternate;
        }
        @keyframes flicker {
            0% { text-shadow: 0 0 5px #ff0000, 0 -5px 10px #ff0000; }
            100% { text-shadow: 0 0 10px #ff0000, 0 -15px 25px #ff4b2b; }
        }

        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: translateY(-3px);
        }

        .scorpio-btn.back { border-color: #ff4b2b; color: #ff4b2b; }

        #msgs {
            font-size: 28px;
            color: #00e5ff;
            margin-top: 10px;
            height: 40px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* --- THE SCORPIO IDENTITY CARD --- */
        .scorpio-card {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #00f2ff;
            border-radius: 25px;
            padding: 15px 50px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            text-align: center;
            min-width: 550px;
        }
        .scorpio-title { font-size: 16px; color: #ffff00; font-weight: bold; margin-bottom: 5px; }
        .scorpio-badge { border: 2px solid #ffff00; border-radius: 15px; padding: 2px 12px; display: inline-block; }
        .name-banner { background: #ff0000; color: white; font-size: 28px; font-weight: bold; padding: 5px 40px; border-radius: 50px; display: inline-block; margin: 8px 0; box-shadow: 0 0 15px #ff0000; text-transform: uppercase; }
        .nice-time-text { font-size: 16px; color: #ffff00; margin-top: 5px; font-weight: bold; }
        .names-list { font-size: 28px; color: white; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }

    </style>

    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);

        function allhost505(){ hideAll(); host505.style.display = "block"; }
        function allhost672(){ hideAll(); host672.style.display = "block"; }
        function allhost900c(){ hideAll(); host900c.style.display = "block"; }
        function allgoldhen(){ hideAll(); goldhen.style.display = "block"; }
        function alltrainer(){ hideAll(); trainer.style.display = "block"; }
        function backall(){ hideAll(); all.style.display = "block"; msgs.innerHTML=""; }
        
        function hideAll(){
            all.style.display = "none";
            host505.style.display = "none";
            host672.style.display = "none";
            host900c.style.display = "none";
            trainer.style.display = "none";
            goldhen.style.display = "none";
        }
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <!-- NEW FIRE TITLE -->
    <div class="fire-title">WELCOME TO SCORPION HACK</div>
    
    <img src="logo.png" style="width:180px; margin: 10px auto;">
    
    <div id="msgs">Select a Category</div>

    <div id="all">
        <button class="scorpio-btn" onclick="allhost505()">FW 5.05</button>
        <button class="scorpio-btn" onclick="allhost672()">FW 6.72</button>
        <button class="scorpio-btn" onclick="allhost900c()">FW 9.00</button>
        <br>
        <button class="scorpio-btn" onclick="allgoldhen()">GoldHEN</button>
        <button class="scorpio-btn" onclick="alltrainer()">Trainers</button>
    </div>

    <div id="host505" style="display:none">
        <a href="505/index.html" class="scorpio-btn">Load 5.05</a>
        <a href="restore/505/index.html" class="scorpio-btn">Restore (No USB)</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <div id="host672" style="display:none">
        <a href="672/index.html" class="scorpio-btn">Load 6.72</a>
        <a href="restore/672/index.html" class="scorpio-btn">Restore (No USB)</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <div id="host900c" style="display:none">
        <a href="900n/index.html" class="scorpio-btn">9.00 Auto</a>
        <a href="900c/index.html" class="scorpio-btn">9.00 Manual</a>
        <a href="restore/900/index.html" class="scorpio-btn">9.00 Restore</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <div id="goldhen" style="display:none">
        <a href="hen/505/index.html" class="scorpio-btn">GoldHEN 5.05</a>
        <a href="hen/672/index.html" class="scorpio-btn">GoldHEN 6.72</a>
        <a href="hen/900/index.html" class="scorpio-btn">GoldHEN 9.00</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <div id="trainer" style="display:none">
        <a href="trainer/index505.html" class="scorpio-btn">Trainer 5.05</a>
        <a href="trainer/index672.html" class="scorpio-btn">Trainer 6.72</a>
        <a href="trainer/index900.html" class="scorpio-btn">Trainer 9.00</a>
        <br><button class="scorpio-btn back" onclick="backall()">Back</button>
    </div>

    <!-- THE SCORPIO CARD -->
    <div class="scorpio-card">
        <div class="scorpio-title">Designed, Compiled by : <span class="scorpio-badge">Scorpio</span></div>
        <div class="name-banner">Ahmed ESSAM</div>
        <div class="nice-time-text">Have A Nice Time :</div>
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>
</body>
</html>
