<html>
<head>
    <title>Scorpio Project - Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        /* 🟢 NEW GLOWING HEADLINE BAR COMPONENT */
        .glowing-headline-bar {
            background: linear-gradient(90deg, rgba(0,229,255,0) 0%, rgba(0,229,255,0.15) 50%, rgba(0,229,255,0) 100%);
            border-top: 1px solid rgba(0, 229, 255, 0.4);
            border-bottom: 1px solid rgba(0, 229, 255, 0.4);
            padding: 12px 0;
            margin: 5px auto 20px auto;
            width: 85%;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            /* Shifting matrix neon glow overlay */
            background-size: 200% auto;
            text-shadow: 0 0 12px #00e5ff, 0 0 25px rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1), inset 0 0 15px rgba(0, 229, 255, 0.05);
            animation: pulseGlowBar 4s ease-in-out infinite;
        }

        /* CONTAINER WRAPPER FOR THE OUTER SPINNING PERIMETER FIRE TRACER */
        .logo-wrapper {
            width: 190px;
            height: 190px;
            margin-left: 30px;
            margin-top: 10px;
            float: left;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            overflow: hidden; 
            box-shadow: 0 0 25px 5px rgba(255, 55, 0, 0.6);
        }

        /* CONIC FIRE matrix */
        .logo-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(#ff0000, #ff7700, #ffea00, #ff3700, #ff0000);
            animation: rotateFire 3s linear infinite;
        }

        /* THE ORIGINAL SQUARE LOGO GRAPHIC WITH ROUNDED EDGES */
        .scorpio-logo {
            width: 182px;
            height: 182px;
            object-fit: cover;
            border-radius: 12px;
            position: relative;
            z-index: 2; 
            background: #000;
        }

        .menu-container {
            clear: both;
            margin-top: 110px; /* Reduced slightly to account for the new banner height balance */
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center; 
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.4s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        /* Compact Scorpio Designer Credit Container Box */
        .designer-credit-box {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #00e5ff;
            border-radius: 14px;
            padding: 4px 25px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7), inset 0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 300px;
        }

        .credit-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #ffff00;
        }

        .rainbow-badge {
            border: 1.5px solid #55ff00;
            border-radius: 12px;
            padding: 1px 12px;
            font-weight: bold;
            font-size: 13px;
            background: transparent;
            background-image: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowShift 8s linear infinite;
        }

        /* Ahmed ESSAM Dark Fire & Golden Magma Neon Pill */
        .name-pill {
            background: #120000;
            border: 1.5px solid #ff3700;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 45px;
            border-radius: 25px;
            box-shadow: 0 0 20px 4px rgba(255, 43, 0, 0.75), inset 0 0 10px rgba(0,0,0,0.9);
            margin: 2px 0;
            display: inline-block;
            background: linear-gradient(45deg, #ff2a00, #ff8800, #ffea00, #ff8800, #ff2a00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: darkFireFlow 3s ease infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .welcome-text {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #00e5ff, #ffffff, #00e5ff, #00ffcc);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlowFade 4s ease infinite;
            text-align: center;
            margin-top: 1px;
        }

        /* KEYFRAMES FOR CYBER BANNER PULSE */
        @keyframes pulseGlowBar {
            0% { opacity: 0.85; filter: drop-shadow(0 0 5px rgba(0, 229, 255, 0.4)); text-shadow: 0 0 10px #00e5ff; }
            50% { opacity: 1; filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.8)); text-shadow: 0 0 18px #00e5ff, 0 0 30px rgba(0,229,255,0.6); }
            100% { opacity: 0.85; filter: drop-shadow(0 0 5px rgba(0, 229, 255, 0.4)); text-shadow: 0 0 10px #00e5ff; }
        }

        @keyframes rotateFire {
            100% { transform: rotate(360deg); }
        }

        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlowFade {
            0% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
            50% { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(0,229,255,0.9)); opacity: 1; }
            100% { background-position: 0% 50%; filter: drop-shadow(0 0 2px rgba(0,255,204,0.3)); opacity: 0.8; }
        }

        @keyframes darkFireFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
    
    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <!-- 🟢 INSTALLED CYBER GLOW WELCOME HEADLINE BAR -->
    <div class="glowing-headline-bar">
        Welcome to SCORPION HACK
    </div>

    <!-- Outer running firewall wrapper box container element -->
    <div class="logo-wrapper">
        <img src="logo.png" class="scorpio-logo">
    </div>

    <div class="menu-container">
        <!-- Specialized PS4 Jailbreak Core Button (Plasma Cyan Pulse Edition) -->
        <a href="hen/index.html" class="scorpio-btn" style="
            background: radial-gradient(circle, rgba(0,229,255,0.3) 0%, rgba(0,0,0,0.6) 100%) !important;
            border: 2px solid #00e5ff !important;
            box-shadow: 0 0 25px 3px rgba(0, 229, 255, 0.75), inset 0 0 10px rgba(0, 229, 255, 0.3) !important;
            color: #ffffff !important;
            font-weight: 900 !important;
            transform: scale(1.08);
            text-shadow: 0 0 8px #00e5ff !important;
            letter-spacing: 2.5px;">
            🔥 PS4 Jailbreak (9.00)
        </a>

        <!-- Untouched Secondary Menu Buttons -->
        <a href="ps5/index.html" class="scorpio-btn">PS5 Exploit</a>
        <a href="ps3/index.html" class="scorpio-btn">PS3 Tools</a>
    </div>

    <!-- Integrated Scorpiozed Designer Credit Component -->
    <div class="designer-credit-box">
        <div class="credit-header">
            Designed, Compiled by : <span class="rainbow-badge">Scorpio</span>
        </div>
        <div class="name-pill">
            Ahmed ESSAM
        </div>
        <div class="welcome-text">
            Welcome to SCORPION HACK
        </div>
    </div>
</body>
</html>
