<html>
<head>
    <title>Scorpio Project - Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        .scorpio-logo {
            width: 300px;
            margin-top: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        .menu-container {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.4s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        /* --- THE NEW SCORPIO IDENTITY CARD --- */
        .scorpio-card {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); /* Dark background like image */
            border: 3px solid #00f2ff; /* Glowing cyan border */
            border-radius: 25px;
            padding: 15px 50px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff;
            text-align: center;
            min-width: 550px;
        }

        .scorpio-title { font-size: 16px; color: #ffff00; font-weight: bold; margin-bottom: 5px; }
        .scorpio-badge { border: 2px solid #ffff00; border-radius: 15px; padding: 2px 12px; display: inline-block; }
        
        .name-banner { 
            background: #ff0000; 
            color: white; 
            font-size: 28px; 
            font-weight: bold; 
            padding: 5px 40px; 
            border-radius: 50px; 
            display: inline-block; 
            margin: 8px 0; 
            box-shadow: 0 0 15px #ff0000; 
            text-transform: uppercase;
        }

        .nice-time-text { font-size: 16px; color: #ffff00; margin-top: 5px; font-weight: bold; }
        .names-list { font-size: 28px; color: white; font-weight: bold; text-shadow: 0 0 10px #00f2ff; }
    </style>
    
    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <img src="logo.png" class="scorpio-logo">

    <div class="menu-container">
        <a href="hen/index.html" class="scorpio-btn">PS4 Jailbreak (9.00)</a>
        <a href="ps5/index.html" class="scorpio-btn">PS5 Exploit</a>
        <a href="ps3/index.html" class="scorpio-btn">PS3 Tools</a>
    </div>

    <!-- THE NEW SCORPIO CARD -->
    <div class="scorpio-card">
        <div class="scorpio-title">
            Designed, Compiled by : <span class="scorpio-badge">Scorpio</span>
        </div>

        <div class="name-banner">Ahmed ESSAM</div>

        <div class="nice-time-text">Have A Nice Time :</div>
        
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>
</body>
</html>
