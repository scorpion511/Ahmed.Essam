<html>
<head>
    <title>Scorpio Project - Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        .scorpio-logo {
            width: 250px; /* Shrunk slightly to save space */
            margin-top: 10px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        .menu-container {
            margin-top: 30px; /* Reduced margin to lift buttons higher */
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            transition: 0.4s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        /* --- THE REFINED COMPACT IDENTITY CARD --- */
        .scorpio-card {
            position: absolute;
            bottom: 5px; /* Pushed to absolute bottom */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #00f2ff; 
            border-radius: 15px;
            padding: 5px 30px; /* Minimal padding */
            box-shadow: 0 0 12px #00f2ff, inset 0 0 5px #00f2ff;
            text-align: center;
            min-width: 380px; /* Narrower to avoid overlap */
            z-index: 100;
        }

        .scorpio-title { font-size: 12px; color: #ffff00; font-weight: bold; margin-bottom: 2px; }

        .scorpio-badge { 
            border: 1.5px solid #ffff00; 
            border-radius: 10px; 
            padding: 1px 8px; 
            display: inline-block;
            animation: badge-rainbow 3s linear infinite;
        }

        @keyframes badge-rainbow {
            0% { color: red; border-color: red; }
            25% { color: yellow; border-color: yellow; }
            50% { color: lime; border-color: lime; }
            75% { color: cyan; border-color: cyan; }
            100% { color: red; border-color: red; }
        }

        .name-banner { 
            background: #ff0000; 
            color: white; 
            font-size: 20px; /* Shrunk font */
            font-weight: bold; 
            padding: 2px 25px; 
            border-radius: 30px; 
            display: inline-block; 
            margin: 4px 0; 
            box-shadow: 0 0 8px #ff0000; 
            text-transform: uppercase;
        }

        .nice-time-text { font-size: 12px; color: #ffff00; margin-top: 2px; font-weight: bold; }
        .names-list { font-size: 20px; color: white; font-weight: bold; text-shadow: 0 0 8px #00f2ff; }
    </style>
    
    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <img src="logo.png" class="scorpio-logo">

    <div class="menu-container">
        <a href="hen/index.html" class="scorpio-btn">PS4 Jailbreak (9.00)</a>
        <a href="ps5/index.html" class="scorpio-btn">PS5 Exploit</a>
        <a href="ps3/index.html" class="scorpio-btn">PS3 Tools</a>
    </div>

    <!-- COMPACT SCORPIO HUD CARD -->
    <div class="scorpio-card">
        <div class="scorpio-title">
            Designed, Compiled by : <span class="scorpio-badge">Scorpio</span>
        </div>
        <div class="name-banner">Ahmed ESSAM</div>
        <div class="nice-time-text">Have A Nice Time :</div>
        <div class="names-list">Dareen & Omar & jojo</div>
    </div>
</body>
</html>
