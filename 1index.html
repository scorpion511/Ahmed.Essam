<html>
<head>
    <title>Scorpio Project - Menu</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Top Bar for Clock and Date */
        .top-bar {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 10px rgba(0, 229, 255, 0.5);
        }

        /* Your Logo Branding */
        .scorpio-logo {
            width: 300px;
            margin-top: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        /* Button Container */
        .menu-container {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        /* The Frost Glowing Button */
        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.4s;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        /* Designer Credit Rectangle */
        .designer-credit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 40px;
            border-radius: 4px;
            font-size: 32px;
            letter-spacing: 2px;
            color: #00e5ff;
        }

        .designer-credit span { color: white; font-weight: bold; }
    </style>
    
    <script>
        function updateTime() {
            var dt = new Date();
            document.getElementById("date").innerHTML = dt.toLocaleDateString();
            document.getElementById("clock").innerHTML = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
    </script>
</head>

<body onload="updateTime()">
    <div class="top-bar">
        <span id="date"></span>
        <span id="clock"></span>
    </div>

    <!-- Your Center Logo -->
    <img src="logo.png" class="scorpio-logo">

    <div class="menu-container">
        <!-- Linking to your local folders for safety -->
        <a href="hen/index.html" class="scorpio-btn">PS4 Jailbreak (9.00)</a>
        <a href="ps5/index.html" class="scorpio-btn">PS5 Exploit</a>
        <a href="ps3/index.html" class="scorpio-btn">PS3 Tools</a>
    </div>

    <div class="designer-credit">
        Designed and Compiled By <span>Ahmed Essam</span>
    </div>
</body>
</html>
