<html>
<head>
    <title>Scorpio Project - Loading</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            background-color: #000;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Scorpio Glow Animation */
        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh; 
            font-size: 65px;
            font-weight: bold;
            letter-spacing: 12px;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.9);
        }

        .welcome-container p {
            margin: 0 5px;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.4; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1.05); }
        }

        /* Stable Designer Credit Rectangle */
        .designer-credit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 40px;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            font-size: 22px;
            letter-spacing: 2px;
            color: #00e5ff;
            white-space: nowrap;
        }

        .designer-credit span {
            color: white;
            font-weight: bold;
        }
    </style>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <meta http-equiv="refresh" content="3;URL=1index.html">
</head>

<body>
    <div class="welcome-container">
        <p>S</p><p>C</p><p>O</p><p>R</p><p>P</p><p>I</p><p>O</p>
    </div>

    <div class="designer-credit">
        Designed and Compiled By <span>Ahmed Essam</span>
    </div>
</body>
</html>
