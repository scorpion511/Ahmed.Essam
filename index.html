<html>
<head>
    <title>Scorpio Project - Loading</title>
    <!-- Removed heavy base64 data for faster loading -->
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            background-color: #000;
            color: white;
            text-align: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Frosty Welcome Text Animation */
        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.8); /* Scorpio Glow */
        }

        .welcome-container p {
            margin: 0 5px;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.3; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }
    </style>
    <!-- Keep your stylesheet link -->
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <!-- Automatic redirect to your main menu -->
    <meta http-equiv="refresh" content="3;URL=1index.html">
</head>

<body>
    <div class="welcome-container">
        <p>S</p>
        <p>C</p>
        <p>O</p>
        <p>R</p>
        <p>P</p>
        <p>I</p>
        <p>O</p>
    </div>

    <!-- Removed Google Ads to keep jailbreak environment clean and offline-friendly -->
</body>
</html>
